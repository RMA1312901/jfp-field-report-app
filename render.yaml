services:
  - type: web
    name: jfp-field-report-app
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: jfp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
