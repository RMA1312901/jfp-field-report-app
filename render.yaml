services:
  - type: web
    name: jfp-field-reports
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        value: ""
      - key: EMAIL_FROM
        value: "JFP Reports <onboarding@resend.dev>"
